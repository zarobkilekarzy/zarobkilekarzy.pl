name = "zarobkilekarzy"
pages_build_output_dir = "dist"
compatibility_date = "2025-06-01"

# Turnstile (antybot sondy i licznika petycji): klucze ustawiane w panelu Cloudflare
# Pages (Settings → Variables and Secrets) — TURNSTILE_SITE_KEY (publiczny) oraz
# TURNSTILE_SECRET_KEY (sekret). Ochrona włącza się, gdy ustawione są OBA.
# Celowo NIE w wrangler.toml: pusty [vars] nadpisywałby wartość z panelu na deployu.

# Sonda (wyniki): binding KV zarządzany w tym pliku — projekt jest w trybie
# „bindings managed through wrangler.toml" (panel CF nie pozwala dodać go ręcznie).
# Namespace tworzy/zapewnia krok CI „Ensure SONDA_KV" w .github/workflows/deploy.yml.
# Bez bindingu /api/sonda zwraca 503, a sonda działa w trybie fallback (bez wyników).
[[kv_namespaces]]
binding = "SONDA_KV"
id = "e25a5a621f954438aec987306b069f1e"

# Liczniki przejść do źródeł — baza D1 „zarobki-clicks" (binding CLICKS_DB).
# Utworzona przez krok CI „Ensure CLICKS_DB"; database_id jawne (jak id KV powyżej).
# Tabelę tworzy Function leniwie; bez bindingu /api/clicks degraduje się łagodnie.
[[d1_databases]]
binding = "CLICKS_DB"
database_name = "zarobki-clicks"
database_id = "88106ccf-6291-4736-a4bd-37cb3cf3b692"
