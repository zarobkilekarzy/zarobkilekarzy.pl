name = "zarobkilekarzy"
pages_build_output_dir = "dist"
compatibility_date = "2025-06-01"

# Turnstile (antybot sondy) — opcjonalny. Site key jest PUBLICZNY, więc trzymamy go
# tutaj (odtwarzalnie, jedno źródło prawdy). Wklej wartość, by włączyć widżet;
# pusty ciąg = ochrona wyłączona. Sekret NIE może tu być — ustaw go poza repo:
#   npx wrangler pages secret put TURNSTILE_SECRET_KEY --project-name=zarobkilekarzy
# Ochrona aktywuje się dopiero, gdy ustawione są OBA klucze.
[vars]
TURNSTILE_SITE_KEY = ""

# Sonda (wyniki): binding KV zarządzany w tym pliku — projekt jest w trybie
# „bindings managed through wrangler.toml" (panel CF nie pozwala dodać go ręcznie).
# Namespace tworzy/zapewnia krok CI „Ensure SONDA_KV" w .github/workflows/deploy.yml.
# Bez bindingu /api/sonda zwraca 503, a sonda działa w trybie fallback (bez wyników).
[[kv_namespaces]]
binding = "SONDA_KV"
id = "e25a5a621f954438aec987306b069f1e"
