name = "zarobkilekarzy"
pages_build_output_dir = "dist"
compatibility_date = "2025-06-01"

# Turnstile (antybot sondy): klucze ustawiane w panelu Cloudflare Pages
# (Settings → Variables and Secrets) — TURNSTILE_SITE_KEY (publiczny) oraz
# TURNSTILE_SECRET_KEY (sekret). Ochrona włącza się, gdy ustawione są OBA.
# Celowo NIE w wrangler.toml: pusty [vars] nadpisywałby wartość z panelu na deployu.

# Sonda (wyniki): binding KV zarządzany w tym pliku — projekt jest w trybie
# „bindings managed through wrangler.toml" (panel CF nie pozwala dodać go ręcznie).
# Namespace tworzy/zapewnia krok CI „Ensure SONDA_KV" w .github/workflows/deploy.yml.
# Bez bindingu /api/sonda zwraca 503, a sonda działa w trybie fallback (bez wyników).
[[kv_namespaces]]
binding = "SONDA_KV"
id = "e25a5a621f954438aec987306b069f1e"

# Liczniki przejść do źródeł — baza D1 „zarobki-clicks" (binding CLICKS_DB).
# Provisioning analogiczny do SONDA_KV: krok CI „Ensure CLICKS_DB" w
# .github/workflows/deploy.yml tworzy bazę i dopisuje binding na czas deployu.
# Ręcznie: `npx wrangler d1 create zarobki-clicks`, a zwrócony database_id wklej
# do bloku [[d1_databases]] (z database_name = zarobki-clicks). Tabelę tworzy
# Function leniwie. Bez bindingu /api/clicks degraduje się łagodnie.
