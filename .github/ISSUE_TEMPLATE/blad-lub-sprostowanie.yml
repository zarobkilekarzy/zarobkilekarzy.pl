name: Błąd lub sprostowanie
description: Zgłoś nieścisłość, błąd faktograficzny, martwy link lub usterkę na stronie.
title: "[Błąd] "
labels: ["blad"]
body:
  - type: input
    id: gdzie
    attributes:
      label: Czego dotyczy?
      description: Adres podstrony lub nazwa pliku/wpisu, którego dotyczy zgłoszenie.
      placeholder: np. /artykuly albo src/content/articles/...
    validations:
      required: true
  - type: textarea
    id: opis
    attributes:
      label: Opis problemu
      description: Co jest nie tak? Co powinno być zamiast tego?
    validations:
      required: true
  - type: input
    id: zrodlo
    attributes:
      label: Źródło poprawnej informacji (jeśli dotyczy)
      description: Publiczny link potwierdzający właściwą wersję.
      placeholder: https://...
    validations:
      required: false
