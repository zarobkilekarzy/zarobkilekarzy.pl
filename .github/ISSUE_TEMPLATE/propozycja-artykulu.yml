name: Propozycja artykułu
description: Podrzuć link do publicznego źródła — rozważymy dodanie wpisu do bazy.
title: "[Artykuł] "
labels: ["propozycja-artykulu"]
body:
  - type: markdown
    attributes:
      value: |
        Dzięki! Przyjmujemy **wyłącznie ogólnodostępne źródła** (prasa, raporty,
        dane publiczne). Zapoznaj się z zasadami redakcyjnymi w `CONTRIBUTING.md`.
  - type: input
    id: url
    attributes:
      label: Link do źródła
      description: Pełny, działający, publiczny URL do oryginału.
      placeholder: https://...
    validations:
      required: true
  - type: input
    id: source
    attributes:
      label: Nazwa źródła / wydawcy
      placeholder: np. Rzeczpospolita, NIK, AOTMiT
    validations:
      required: true
  - type: dropdown
    id: sourceType
    attributes:
      label: Typ źródła
      options:
        - prasa
        - raport
        - analiza
        - dane
        - wideo
    validations:
      required: true
  - type: dropdown
    id: category
    attributes:
      label: Kategoria
      options:
        - wieloetatowosc
        - kontrakty
        - kolejki
        - wynagrodzenia
        - system
    validations:
      required: true
  - type: textarea
    id: excerpt
    attributes:
      label: Krótki opis (1–2 zdania)
      description: Własnymi słowami, czego dotyczy materiał.
    validations:
      required: true
  - type: checkboxes
    id: zasady
    attributes:
      label: Zgodność z zasadami redakcyjnymi
      options:
        - label: Źródło jest publiczne i działa (sprawdziłem/am w incognito).
          required: true
        - label: Materiał opisuje mechanizm, nie piętnuje imiennie osoby prywatnej.
          required: true
        - label: Nie zawiera danych wrażliwych (PESEL, adres, dane osoby prywatnej).
          required: true
